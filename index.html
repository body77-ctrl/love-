<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#444;
color:white;
position:fixed;
left:60%;
top:60%;
}

#main{
display:none;
}

img{
width:300px;
border-radius:20px;
margin-top:20px;
opacity:0;
transform:scale(0.6);
transition:1s;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#timer{
font-size:22px;
margin-top:15px;
}

#message{
font-size:30px;
margin-top:30px;
font-weight:bold;
min-height:40px;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-100vh) scale(1.5);
opacity:0;
}

}

</style>
</head>

<body>

<div id="questionBox">

<h1>Do you like surprises? 😊</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>

</div>


<div id="main">

<h1>The moment I noticed you...</h1>

<div id="timer"></div>

<img id="photo" src="her.jpg">

<div id="message"></div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>

/* زرار NO يهرب */

let no=document.getElementById("no");

no.addEventListener("mouseover",function(){

let maxX=window.innerWidth-no.offsetWidth;
let maxY=window.innerHeight-no.offsetHeight;

let x=Math.random()*maxX;
let y=Math.random()*maxY;

no.style.left=x+"px";
no.style.top=y+"px";

});


/* زرار YES */

let yes=document.getElementById("yes");

yes.onclick=function(){

document.getElementById("questionBox").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

startTimer();
showImage();
typeMessage();
hearts();
heartExplosion();

}


/* العداد */

function startTimer(){

let startDate=new Date("2026-2-24");

setInterval(function(){

let now=new Date();
let diff=now-startDate;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff/(1000*60*60))%24);
let minutes=Math.floor((diff/(1000*60))%60);
let seconds=Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML=
days+" days "+hours+" hours "+minutes+" seconds "+seconds;

},1000)

}


/* ظهور الصورة */

function showImage(){

setTimeout(function(){

let img=document.getElementById("photo");
img.style.opacity="1";
img.style.transform="scale(1)";

},1000)

}


/* الرسالة */

function typeMessage(){

let text="You are the most beautiful lady I've ever seen ❤️";
let i=0;

let interval=setInterval(function(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);
i++;

}else{

clearInterval(interval);

}

},80)

}


/* القلوب */

function hearts(){

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000)

},300)

}


/* انفجار القلوب */

function heartExplosion(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";

let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

heart.style.transition="1s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.transform="translate("+x+"px,"+y+"px)";
heart.style.opacity="0";

},10)

setTimeout(()=>{
heart.remove();
},1000)

}

}

</script>

</body>
</html>
