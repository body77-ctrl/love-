<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
position:relative;
transition:1s;
}

body::before{
content:"Menna ❤️ Menna ❤️ Menna ❤️ ";
position:absolute;
top:0;
left:0;
width:200%;
height:200%;
font-size:40px;
color:rgba(255,255,255,0.08);
transform:rotate(-25deg);
pointer-events:none;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#444;
color:white;
position:fixed;
left:60%;
top:60%;
}

#main{
display:none;
padding:20px;
}

img{
width:90%;
max-width:300px;
border-radius:20px;
margin-top:20px;
opacity:0;
transform:scale(0.6);
transition:1s;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#timer{
font-size:18px;
margin-top:15px;
}

#message{
font-size:22px;
margin-top:30px;
font-weight:bold;
min-height:40px;
}

.heart, .loveText{
position:fixed;
bottom:-10px;
animation:float 6s linear infinite;
}

.loveText{
font-size:18px;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
z-index:999;
}

</style>
</head>

<body>

<div id="questionBox">
<h1>Do you like surprises? 😊</h1>
<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>
</div>

<div id="main">
<h1>The moment I noticed you...</h1>
<div id="timer"></div>
<img id="photo" src="her.jpg">
<div id="message"></div>
</div>

<div id="final">
I love you forever ❤️
</div>

<audio id="music" src="music.mp3"></audio>

<script>

let no=document.getElementById("no");
let yes=document.getElementById("yes");
let yesSize=1;

function moveNo(){
let maxX=window.innerWidth-no.offsetWidth-20;
let maxY=window.innerHeight-no.offsetHeight-20;

no.style.left=Math.random()*maxX+"px";
no.style.top=Math.random()*maxY+"px";

yesSize+=0.1;
yes.style.transform="scale("+yesSize+")";
}

no.addEventListener("mouseover",moveNo);
no.addEventListener("touchstart",moveNo);
no.addEventListener("click",moveNo);


yes.onclick=function(){

document.getElementById("questionBox").style.display="none";
document.getElementById("main").style.display="block";

let music=document.getElementById("music");
music.play();

/* لما الأغنية تخلص */
music.onended=function(){
document.getElementById("final").style.display="flex";
};

startTimer();
showImage();
typeMessage();
hearts();
loveTexts();
heartExplosion();

}


function startTimer(){

let startDate=new Date("2026-2-24");

setInterval(function(){

let now=new Date();
let diff=now-startDate;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff/(1000*60*60))%24);
let m=Math.floor((diff/(1000*60))%60);
let s=Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML=
d+" days "+h+" hours "+m+" minutes "+s+" seconds";

},1000)

}


function showImage(){
setTimeout(()=>{
let img=document.getElementById("photo");
img.style.opacity="1";
img.style.transform="scale(1)";
},1000)
}


function typeMessage(){

let text="You are the most beautiful lady I've ever seen ❤️";
let i=0;

let interval=setInterval(function(){

if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
}else{
clearInterval(interval);
}

},80)

}


function hearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},400)
}


/* I LOVE MENNA */

function loveTexts(){
setInterval(()=>{
let t=document.createElement("div");
t.className="loveText";
t.innerHTML="I love menna 💖";
t.style.left=Math.random()*100+"vw";
document.body.appendChild(t);
setTimeout(()=>t.remove(),6000);
},800)
}


function heartExplosion(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";

let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

heart.style.transition="1s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.style.transform=`translate(${x}px,${y}px)`;
heart.style.opacity="0";
},10)

setTimeout(()=>heart.remove(),1000)

}

}

</script>

</body>
</html>
